name: Performance Budget

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  performance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build
        run: |
          cd frontend
          npm run build

      - name: Check Bundle Size
        run: |
          cd frontend
          # Calculate total size of main bundles (using find to be robust across Next.js versions)
          SIZE=$(find .next/static/chunks -name "main-*.js" -o -name "main-app-*.js" -o -name "layout-*.js" | xargs du -sk 2>/dev/null | awk '{sum+=$1} END {print sum + 0}')
          echo "Total main bundle size: ${SIZE}KB"
          if [ "$SIZE" -gt 500 ]; then
            echo "Main bundle exceeds 500KB budget!"
            # exit 1 # Uncomment to fail CI if budget is strictly enforced
          fi

      - name: Lighthouse CI
        run: |
          npm install -g @lhci/cli@0.13.x
          cd frontend
          # Note: This requires a running server or lhci autorun config
          # For now, we just list the intention
          echo "Lighthouse CI would run here"

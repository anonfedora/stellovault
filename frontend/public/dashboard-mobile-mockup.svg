<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" font-family="Inter, system-ui, sans-serif">
  <defs>
    <filter id="s" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000018"/>
    </filter>
    <clipPath id="phone">
      <rect x="0" y="0" width="390" height="844" rx="40"/>
    </clipPath>
  </defs>

  <!-- Phone body -->
  <rect x="0" y="0" width="390" height="844" rx="40" fill="#F9FAFB"/>

  <!-- Status bar -->
  <rect x="0" y="0" width="390" height="44" fill="#111827"/>
  <text x="20" y="28" font-size="12" font-weight="600" fill="#FFFFFF">9:41</text>
  <text x="340" y="28" font-size="11" fill="#FFFFFF">●●●</text>

  <!-- Header -->
  <rect x="0" y="44" width="390" height="56" fill="#111827"/>
  <text x="20" y="72" font-size="18" font-weight="700" fill="#FFFFFF">Dashboard</text>
  <text x="20" y="90" font-size="11" fill="#9CA3AF">Trade Finance Overview</text>
  <rect x="330" y="56" width="44" height="24" rx="6" fill="#1D4ED8"/>
  <text x="340" y="72" font-size="10" fill="#FFFFFF">Export</text>

  <!-- Live badge -->
  <rect x="20" y="108" width="52" height="22" rx="11" fill="#ECFDF5"/>
  <circle cx="34" cy="119" r="4" fill="#10B981"/>
  <text x="42" y="123" font-size="10" fill="#065F46">Live</text>
  <text x="80" y="123" font-size="10" fill="#9CA3AF">Updated 09:41:22</text>

  <!-- Stats cards — 2-col grid -->
  <!-- Card 1 -->
  <rect x="16" y="140" width="172" height="72" rx="10" fill="#FFFFFF" filter="url(#s)"/>
  <text x="28" y="160" font-size="10" fill="#6B7280">Active loans</text>
  <text x="28" y="188" font-size="26" font-weight="700" fill="#111827">2</text>
  <!-- Card 2 -->
  <rect x="202" y="140" width="172" height="72" rx="10" fill="#FFFFFF" filter="url(#s)"/>
  <text x="214" y="160" font-size="10" fill="#6B7280">Collateral pledged</text>
  <text x="214" y="188" font-size="22" font-weight="700" fill="#111827">$155K</text>
  <!-- Card 3 -->
  <rect x="16" y="224" width="172" height="72" rx="10" fill="#FFFFFF" filter="url(#s)"/>
  <text x="28" y="244" font-size="10" fill="#6B7280">Outstanding</text>
  <text x="28" y="272" font-size="22" font-weight="700" fill="#D97706">$62,850</text>
  <!-- Card 4 -->
  <rect x="202" y="224" width="172" height="72" rx="10" fill="#FFFFFF" filter="url(#s)"/>
  <text x="214" y="244" font-size="10" fill="#6B7280">Repaid</text>
  <text x="214" y="272" font-size="22" font-weight="700" fill="#10B981">$13,500</text>

  <!-- Portfolio Overview (collapsed) -->
  <rect x="16" y="308" width="358" height="130" rx="10" fill="#FFFFFF" filter="url(#s)"/>
  <text x="28" y="330" font-size="13" font-weight="600" fill="#111827">Portfolio Overview</text>
  <!-- Progress bars -->
  <text x="28" y="354" font-size="11" fill="#374151">Repayment progress</text>
  <text x="330" y="354" font-size="11" font-weight="600" fill="#111827">17.7%</text>
  <rect x="28" y="360" width="334" height="8" rx="4" fill="#F3F4F6"/>
  <rect x="28" y="360" width="59" height="8" rx="4" fill="#10B981"/>
  <text x="28" y="386" font-size="11" fill="#374151">Collateral utilization</text>
  <text x="330" y="386" font-size="11" font-weight="600" fill="#111827">51.6%</text>
  <rect x="28" y="392" width="334" height="8" rx="4" fill="#F3F4F6"/>
  <rect x="28" y="392" width="172" height="8" rx="4" fill="#3B82F6"/>
  <!-- Count pills -->
  <rect x="28" y="410" width="100" height="22" rx="6" fill="#ECFDF5"/>
  <text x="52" y="425" font-size="10" fill="#065F46">Active: 2</text>
  <rect x="140" y="410" width="100" height="22" rx="6" fill="#FFFBEB"/>
  <text x="162" y="425" font-size="10" fill="#92400E">Pending: 1</text>
  <rect x="252" y="410" width="110" height="22" rx="6" fill="#FEF2F2"/>
  <text x="272" y="425" font-size="10" fill="#991B1B">Defaulted: 0</text>

  <!-- Collateral Portfolio (mobile card list) -->
  <rect x="16" y="450" width="358" height="180" rx="10" fill="#FFFFFF" filter="url(#s)"/>
  <text x="28" y="472" font-size="13" font-weight="600" fill="#111827">Collateral Portfolio</text>
  <!-- Row 1 -->
  <line x1="16" y1="482" x2="374" y2="482" stroke="#F3F4F6" stroke-width="1"/>
  <text x="28" y="500" font-size="12" font-weight="500" fill="#111827">loan-1 · Invoice</text>
  <rect x="290" y="488" width="52" height="18" rx="9" fill="#ECFDF5"/>
  <text x="302" y="501" font-size="10" fill="#065F46">active</text>
  <text x="28" y="516" font-size="11" fill="#6B7280">$50,000 collateral · $25,000 principal</text>
  <rect x="28" y="522" width="200" height="5" rx="2.5" fill="#E5E7EB"/>
  <rect x="28" y="522" width="100" height="5" rx="2.5" fill="#3B82F6"/>
  <!-- Row 2 -->
  <line x1="16" y1="534" x2="374" y2="534" stroke="#F3F4F6" stroke-width="1"/>
  <text x="28" y="552" font-size="12" font-weight="500" fill="#111827">loan-2 · Commodity</text>
  <rect x="290" y="540" width="52" height="18" rx="9" fill="#ECFDF5"/>
  <text x="302" y="553" font-size="10" fill="#065F46">active</text>
  <text x="28" y="568" font-size="11" fill="#6B7280">$75,000 collateral · $40,000 principal</text>
  <rect x="28" y="574" width="200" height="5" rx="2.5" fill="#E5E7EB"/>
  <rect x="28" y="574" width="107" height="5" rx="2.5" fill="#3B82F6"/>
  <!-- Row 3 -->
  <line x1="16" y1="586" x2="374" y2="586" stroke="#F3F4F6" stroke-width="1"/>
  <text x="28" y="604" font-size="12" font-weight="500" fill="#111827">loan-3 · Receivable</text>
  <rect x="286" y="592" width="60" height="18" rx="9" fill="#FFFBEB"/>
  <text x="296" y="605" font-size="10" fill="#92400E">pending</text>
  <text x="28" y="620" font-size="11" fill="#6B7280">$30,000 collateral · $15,000 principal</text>

  <!-- Quick Actions -->
  <rect x="16" y="642" width="358" height="100" rx="10" fill="#FFFFFF" filter="url(#s)"/>
  <text x="28" y="664" font-size="13" font-weight="600" fill="#111827">Quick Actions</text>
  <rect x="28" y="674" width="156" height="52" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <text x="44" y="698" font-size="12" font-weight="500" fill="#111827">Originate loan</text>
  <text x="44" y="712" font-size="10" fill="#6B7280">Pledge collateral</text>
  <rect x="196" y="674" width="156" height="52" rx="8" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="212" y="698" font-size="12" font-weight="500" fill="#1D4ED8">Liquidity</text>
  <text x="212" y="712" font-size="10" fill="#3B82F6">Deposit / Withdraw</text>

  <!-- Bottom nav -->
  <rect x="0" y="756" width="390" height="88" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <text x="28" y="790" font-size="9" fill="#1D4ED8">⬛</text>
  <text x="20" y="804" font-size="9" fill="#1D4ED8">Dashboard</text>
  <text x="100" y="790" font-size="9" fill="#9CA3AF">⬛</text>
  <text x="96" y="804" font-size="9" fill="#9CA3AF">Loans</text>
  <text x="180" y="790" font-size="9" fill="#9CA3AF">⬛</text>
  <text x="170" y="804" font-size="9" fill="#9CA3AF">Collateral</text>
  <text x="260" y="790" font-size="9" fill="#9CA3AF">⬛</text>
  <text x="254" y="804" font-size="9" fill="#9CA3AF">Escrows</text>
  <text x="340" y="790" font-size="9" fill="#9CA3AF">⬛</text>
  <text x="336" y="804" font-size="9" fill="#9CA3AF">Risk</text>
</svg>

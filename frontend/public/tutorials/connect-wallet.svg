<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" role="img" aria-label="Connect wallet tutorial animation">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1220" />
      <stop offset="1" stop-color="#0F2A5F" />
    </linearGradient>
    <linearGradient id="btn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4F46E5" />
      <stop offset="1" stop-color="#2563EB" />
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <style>
      .label { font: 600 22px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #E5E7EB; }
      .muted { font: 500 14px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: rgba(229,231,235,0.75); }
      .btnText { font: 700 16px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #FFFFFF; }
      .cursor { animation: cursorMove 15s infinite cubic-bezier(0.2, 0.8, 0.2, 1); }
      .pulse { animation: pulse 15s infinite ease-in-out; transform-origin: 454px 234px; }
      @keyframes cursorMove {
        0% { transform: translate(80px, 250px); opacity: 0; }
        8% { opacity: 1; }
        25% { transform: translate(260px, 190px); }
        45% { transform: translate(390px, 210px); }
        55% { transform: translate(410px, 220px); }
        65% { transform: translate(410px, 220px); }
        80% { transform: translate(140px, 260px); opacity: 1; }
        100% { transform: translate(80px, 250px); opacity: 0; }
      }
      @keyframes pulse {
        0%, 45% { opacity: 0; }
        55% { opacity: 1; transform: scale(1); }
        60% { opacity: 0; transform: scale(1.6); }
        100% { opacity: 0; }
      }
    </style>
  </defs>

  <rect width="640" height="360" rx="18" fill="url(#bg)" />

  <!-- Card -->
  <rect x="90" y="64" width="460" height="232" rx="18" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.18)" />
  <text x="120" y="112" class="label">Connect your wallet</text>
  <text x="120" y="140" class="muted">Freighter (recommended) → Sign in → Open dashboard</text>

  <!-- Button -->
  <g filter="url(#softGlow)">
    <rect x="360" y="210" width="160" height="46" rx="12" fill="url(#btn)" />
    <text x="440" y="240" text-anchor="middle" class="btnText">Connect Wallet</text>
  </g>

  <!-- Fake nav dots -->
  <g opacity="0.75">
    <circle cx="120" cy="84" r="4" fill="#FCA5A5" />
    <circle cx="136" cy="84" r="4" fill="#FDE68A" />
    <circle cx="152" cy="84" r="4" fill="#86EFAC" />
  </g>

  <!-- Cursor -->
  <g class="cursor">
    <path d="M10 0 L0 32 L12 26 L18 40 L26 36 L20 22 L34 22 Z" fill="#FFFFFF" opacity="0.95" />
    <circle cx="420" cy="220" r="12" fill="rgba(255,255,255,0.0)" />
  </g>

  <!-- Click pulse -->
  <circle class="pulse" cx="440" cy="234" r="10" fill="rgba(255,255,255,0.0)" stroke="rgba(255,255,255,0.85)" stroke-width="2" />
</svg>


<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" role="img" aria-label="Create escrow tutorial animation">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#160B2B" />
      <stop offset="1" stop-color="#3B0764" />
    </linearGradient>
    <linearGradient id="accent3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#A855F7" />
      <stop offset="1" stop-color="#6366F1" />
    </linearGradient>
    <style>
      .label { font: 600 22px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #F5F3FF; }
      .muted { font: 500 14px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: rgba(245,243,255,0.75); }
      .btnText { font: 700 16px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #0B1220; }
      .cursor { animation: cursorMove 15s infinite cubic-bezier(0.2, 0.8, 0.2, 1); }
      .lock { animation: lockGlow 15s infinite ease-in-out; transform-origin: 170px 206px; }
      @keyframes cursorMove {
        0% { transform: translate(120px, 255px); opacity: 0; }
        10% { opacity: 1; }
        35% { transform: translate(250px, 195px); }
        55% { transform: translate(390px, 220px); }
        65% { transform: translate(410px, 225px); }
        80% { transform: translate(200px, 270px); }
        100% { transform: translate(120px, 255px); opacity: 0; }
      }
      @keyframes lockGlow {
        0%, 45% { opacity: 0.6; }
        55% { opacity: 1; transform: scale(1.05); }
        65% { opacity: 0.6; transform: scale(1); }
        100% { opacity: 0.6; }
      }
    </style>
  </defs>

  <rect width="640" height="360" rx="18" fill="url(#bg3)" />

  <rect x="90" y="64" width="460" height="232" rx="18" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.18)" />
  <text x="120" y="112" class="label">Create an escrow</text>
  <text x="120" y="140" class="muted">Set conditions → Lock funds → Release on verification</text>

  <!-- Condition chips -->
  <g opacity="0.85">
    <rect x="120" y="164" width="160" height="34" rx="12" fill="rgba(255,255,255,0.08)" />
    <text x="200" y="186" text-anchor="middle" class="muted">Shipment verified</text>
    <rect x="290" y="164" width="150" height="34" rx="12" fill="rgba(255,255,255,0.08)" />
    <text x="365" y="186" text-anchor="middle" class="muted">Invoice paid</text>
  </g>

  <!-- Lock icon -->
  <g class="lock" transform="translate(135 198)">
    <rect x="0" y="20" width="70" height="62" rx="14" fill="rgba(245,243,255,0.85)" />
    <path d="M18 20 v-10 a17 17 0 0 1 34 0 v10" fill="none" stroke="#3B0764" stroke-width="6" stroke-linecap="round" />
    <circle cx="35" cy="52" r="8" fill="#3B0764" opacity="0.85" />
  </g>

  <!-- Action button -->
  <rect x="390" y="214" width="130" height="42" rx="12" fill="url(#accent3)" />
  <text x="455" y="242" text-anchor="middle" class="btnText">Create</text>

  <!-- Cursor -->
  <g class="cursor">
    <path d="M10 0 L0 32 L12 26 L18 40 L26 36 L20 22 L34 22 Z" fill="#FFFFFF" opacity="0.95" />
  </g>
</svg>

